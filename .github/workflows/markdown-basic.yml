name: Markdown basic

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Markdown basic / validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate article markdown
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          required_frontmatter = {
              "title",
              "source",
              "author",
              "published",
              "ingested",
              "tags",
              "content_type",
              "status",
              "confidence",
          }
          old_required_sections = [
              "# Summary",
              "# Why It Matters",
              "# Key Ideas",
              "# Notable Quotes / Examples",
              "# Contrarian View",
              "# Connections",
              "# My Take",
              "# Action Items",
              "# Source",
          ]
          new_required_sections = [
              "# TL;DR",
              "# Core Insight",
              "# Why It Matters",
              "# My Take",
              "# Connections",
              "# References",
          ]
          path_pattern = re.compile(r"^articles/\d{4}/(0[1-9]|1[0-2])/[^/\\]+\.md$")
          invalid_filename_chars = set('\\/:*?"<>|')

          def changed_article_files():
              output = subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "--diff-filter=ACMRT",
                      os.environ["BASE_SHA"],
                      os.environ["HEAD_SHA"],
                      "--",
                      "articles",
                  ],
                  text=True,
              )
              return [
                  Path(line.strip())
                  for line in output.splitlines()
                  if line.strip().endswith(".md")
                  and line.strip() != "articles/article_template.md"
              ]

          def frontmatter_keys(frontmatter):
              keys = set()
              for line in frontmatter:
                  match = re.match(r"^([A-Za-z_][A-Za-z0-9_-]*):", line)
                  if match:
                      keys.add(match.group(1))
              return keys

          def validate_file(path):
              errors = []
              display_path = path.as_posix()
              if not path_pattern.match(display_path):
                  errors.append("path must match articles/YYYY/MM/<title>.md")

              if any(char in path.name for char in invalid_filename_chars):
                  errors.append("filename contains a filesystem-invalid character")

              text = path.read_text(encoding="utf-8")
              lines = text.splitlines()
              if not lines or lines[0] != "---":
                  errors.append("file must start with YAML-style frontmatter")
                  return errors

              try:
                  end = lines.index("---", 1)
              except ValueError:
                  errors.append("frontmatter closing --- is missing")
                  return errors

              found_keys = frontmatter_keys(lines[1:end])
              missing_keys = sorted(required_frontmatter - found_keys)
              if missing_keys:
                  errors.append("frontmatter missing keys: " + ", ".join(missing_keys))

              body = "\n".join(lines[end + 1 :])
              old_missing_sections = [
                  section
                  for section in old_required_sections
                  if not re.search(rf"^{re.escape(section)}\s*$", body, re.MULTILINE)
              ]
              new_missing_sections = [
                  section
                  for section in new_required_sections
                  if not re.search(rf"^{re.escape(section)}\s*$", body, re.MULTILINE)
              ]
              if old_missing_sections and new_missing_sections:
                  errors.append(
                      "missing required article sections for both accepted templates; "
                      "old template missing: "
                      + ", ".join(old_missing_sections)
                      + "; new template missing: "
                      + ", ".join(new_missing_sections)
                  )

              if "\t" in text:
                  errors.append("tabs are not allowed in article markdown")

              if re.search(r"[ \t]+$", text, re.MULTILINE):
                  errors.append("trailing whitespace is not allowed")

              if not text.endswith("\n"):
                  errors.append("file must end with a newline")

              return errors

          files = changed_article_files()
          if not files:
              print("No changed article markdown files to validate.")
              sys.exit(0)

          failures = {}
          for file_path in files:
              errors = validate_file(file_path)
              if errors:
                  failures[file_path.as_posix()] = errors

          if failures:
              for file_path, errors in failures.items():
                  print(f"::error file={file_path}::{'; '.join(errors)}")
              sys.exit(1)

          print(f"Validated {len(files)} article markdown file(s).")
          PY
